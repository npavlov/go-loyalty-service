name: "gophermart"

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Start Redis
        uses: supercharge/redis-github-action@1.8.0
        with:
          redis-version: 7

      - name: Set up Redis client
        run: |
          sudo apt-get update
          sudo apt-get install redis-tools

      - name: Test Redis connection
        run: |
          # Wait for Redis to start
          sleep 5
          redis-cli -h 127.0.0.1 -p 6379 ping

      - name: Run Kafka KRaft Broker
        uses: spicyparrot/kafka-kraft-action@v1.1.3
        with:
          kafka-topics: "orders,1"

      - uses: ikalnytskyi/action-setup-postgres@v7
        id: postgres

      - name: Download autotests binaries
        uses: robinraju/release-downloader@v1.11
        with:
          repository: Yandex-Practicum/go-autotests
          latest: true
          fileName: "*"
          out-file-path: .tools
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup autotest binary
        run: |
          chmod -R +x $GITHUB_WORKSPACE/.tools
          mv $GITHUB_WORKSPACE/.tools/gophermarttest /usr/local/bin/gophermarttest
          mv $GITHUB_WORKSPACE/.tools/random /usr/local/bin/random

      - name: Build app
        run: make build

      - name: Prepare binaries
        run: |
          (cd cmd/accrual && chmod +x accrual_linux_amd64)

      - name: Test
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: praktikum
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          KAFKA: localhost:9092
          REDIS: 127.0.0.1:6379
          DATABASE_URI: ${{ steps.postgres.outputs.connection-uri }}
        run: |
          gophermarttest \
            -test.v -test.run=^TestGophermart$ \
            -gophermart-binary-path=bin/server \
            -gophermart-host=localhost \
            -gophermart-port=$(random unused-port) \
            -gophermart-database-uri=${{ steps.postgres.outputs.connection-uri }} \
            -accrual-binary-path=cmd/accrual/accrual_linux_amd64 \
            -accrual-host=localhost \
            -accrual-port=$(random unused-port) \
            -accrual-database-uri=${{ steps.postgres.outputs.connection-uri }}